# ================================================================
# book-ai prod nginx 配置（2026-05-21 deployer v3 新建）
#
# 用法（ECS 上）：
#   1. scp 本文件到 /opt/book-ai/nginx/conf/nginx.conf
#   2. scp book-ui dist/ 到 /opt/book-ai/nginx/html/
#   3. 起 nginx 容器：
#      docker run -d --name book-nginx --restart unless-stopped \
#        -p 80:80 \
#        -v /opt/book-ai/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro \
#        -v /opt/book-ai/nginx/html:/usr/share/nginx/html:ro \
#        -v /opt/book-ai/nginx/log:/var/log/nginx \
#        nginx:1.23.4
#   4. smoke: curl -I http://localhost/        (期望 200)
#            curl http://localhost/api/auth/code  (期望 200 + 验证码 JSON)
#
# 注意：
#   - 如复用 errorbook 老 nginx，把 server block 加进老 nginx.conf 即可（不要覆盖老配置）
#   - 用户拍板暂无域名，server_name = _ 匹配所有 host（含 IP 直访）
#   - 用户拍板不启 https（等域名备案后再加 443 + ssl 段）
# ================================================================

worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests 100000;
    client_max_body_size 100m;
    client_header_buffer_size 32k;
    client_body_buffer_size   512k;
    gzip_static on;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    upstream book-server {
        # host 网络模式：容器端口 = 宿主机端口
        # 错开 errorbook 已占 8080 → book-server 走 8081
        server 127.0.0.1:8081;
    }

    server {
        # 错开 errorbook 已占 80 → book-nginx 走 8082
        # 浏览器访问 http://<ECS-IP>:8082/
        listen       8082;
        server_name  _;  # 暂无域名，匹配所有 host

        # 拦截外网访问 actuator / 接口文档（防泄漏）
        location ~ ^(/[^/]*)?/actuator.*(/.*)?$ {
            return 403;
        }
        location ~ ^/v3/api-docs.* {
            return 403;
        }
        location ~ ^/swagger-ui.* {
            return 403;
        }

        # FE SPA（book-ui dist）
        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index  index.html;
        }

        # API 反代 → book-server :8080
        # 客户端 path /api/teacher/qd/note/123 → 转发 http://book-server/teacher/qd/note/123
        # （rewrite 掉 /api 前缀，跟 vite dev proxy 一致）
        location /api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 长连接 / SSE 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_buffering off;
            proxy_cache off;
            # 去 /api 前缀转发
            proxy_pass http://book-server/;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
